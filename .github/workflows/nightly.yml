name: Nightly Build
on:
  push:
    branches:
      - dev*
    paths:
      - "androidApp/**"
      - "composeApp/**"
      - "buildScript/**"
      - "buildScr/**"
      - "libcore/**"
      - "grade/**"
      - ".github/workflows/nightly.yml"

jobs:
  libcore:
    name: Native Build (LibCore)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Golang Status
        run: find buildScript libcore/*.sh | xargs cat | sha1sum > golang_status
      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status
      - name: LibCore Cache
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            composeApp/libs
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}
      - name: Verify LibCore cache
        id: verify_libcore
        run: |
          missing=0
          required_files=(
            "composeApp/libs/libcore.aar"
            "composeApp/libs/libcore-desktop-linux-amd64.jar"
            "composeApp/libs/libcore-desktop-linux-arm64.jar"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required libcore artifact: $file"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=false" >> "$GITHUB_OUTPUT"
      - name: Golang Version
        if: steps.verify_libcore.outputs.ready != 'true'
        id: version
        run: |
          source buildScript/init/version.sh
          echo go_version=$GO_VERSION >> $GITHUB_OUTPUT
      - name: Install Golang
        if: steps.verify_libcore.outputs.ready != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.version.outputs.go_version }}
          cache-dependency-path: libcore/go.sum
      - uses: actions/setup-java@v5
        if: steps.verify_libcore.outputs.ready != 'true'
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Android NDK
        if: steps.verify_libcore.outputs.ready != 'true'
        # Pin NDK version for `gomobile`.
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          add-to-path: true
          ndk-version: r29
          local-cache: false
      - name: Native Build
        if: steps.verify_libcore.outputs.ready != 'true'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # ./run lib core --android --desktop --desktoptargets linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64
          ./run lib core --android --desktop --desktoptargets linux/amd64,linux/arm64
      - name: Upload libcore
        uses: actions/upload-artifact@v6
        with:
          path: |
            composeApp/libs/libcore.aar
            composeApp/libs/libcore-desktop-linux-amd64.jar
            composeApp/libs/libcore-desktop-linux-arm64.jar
          if-no-files-found: error
          name: "libcore"
  build:
    name: Build FOSS APK
    runs-on: ubuntu-latest
    needs:
      - libcore
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: LibCore Artifact
        uses: actions/download-artifact@v7
        with:
          name: "libcore"
          path: composeApp/libs
      - name: Verify libcore artifacts
        run: |
          ls -la composeApp/libs || true
          test -f composeApp/libs/libcore.aar
          test -f composeApp/libs/libcore-desktop-linux-amd64.jar
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v5
      - name: Golang Version
        if: steps.cache.outputs.cache-hit != 'true'
        id: version
        run: |
          source buildScript/init/version.sh
          echo go_version=$GO_VERSION >> $GITHUB_OUTPUT
      - name: Install Golang
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.version.outputs.go_version }}
          cache-dependency-path: libcore/go.sum
      - name: Gradle Build
        env:
          BUILD_PLUGIN: none
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "${{ secrets.LOCAL_PROPERTIES }}" >> local.properties
          ./run init action gradle
          ./gradlew clean androidApp:assembleFossDebug
          APK=$(find androidApp/build/outputs/apk -name '*arm64-v8a*.apk')
          APK=$(dirname $APK)
          rm $APK/output-metadata.json
          echo "APK=$APK" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v6
        with:
          name: APKs
          path: ${{ env.APK }}

  desktop:
    name: Build Desktop (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - libcore
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux/amd64
          - linux/arm64
#          - darwin/amd64
#          - darwin/arm64
#          - windows/amd64
#          - windows/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: LibCore Artifact
        uses: actions/download-artifact@v7
        with:
          name: "libcore"
          path: composeApp/libs
      - name: Verify libcore artifacts
        run: |
          target="${{ matrix.target }}"
          platform="${target%%/*}"
          arch="${target##*/}"
          required_jar="composeApp/libs/libcore-desktop-${platform}-${arch}.jar"
          ls -la composeApp/libs || true
          test -f composeApp/libs/libcore.aar
          test -f "$required_jar"
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v5
      - name: Desktop Build
        env:
          BUILD_PLUGIN: none
        run: |
          ./run init action gradle
          ./gradlew -p composeApp :composeApp:compileKotlinDesktop -PdesktopTarget=${{ matrix.target }}
      - name: Normalize artifact target
        id: artifact_target
        run: |
          target="${{ matrix.target }}"
          echo "safe=${target//\//-}" >> "$GITHUB_OUTPUT"
      - name: Upload Desktop Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: "desktop-build-${{ steps.artifact_target.outputs.safe }}"
          if-no-files-found: warn
          path: |
            composeApp/build/kotlin/compileKotlinDesktop
            composeApp/build/classes/kotlin/desktop

