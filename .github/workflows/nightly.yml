name: Nightly Build
on:
  push:
    branches:
      - dev*
    paths:
      - "androidApp/**"
      - "composeApp/**"
      - "buildScript/**"
      - "release/linux/**"
      - "launcher/**"
      - "buildScr/**"
      - "libcore/**"
      - "grade/**"
      - ".github/workflows/nightly.yml"

jobs:
  libcore:
    name: Native Build (LibCore)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Golang Status
        run: find buildScript libcore/*.sh | xargs cat | sha1sum > golang_status
      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status
      - name: LibCore Cache
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            composeApp/libs
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}
      - name: Verify LibCore cache
        id: verify_libcore
        run: |
          missing=0
          required_files=(
            "composeApp/libs/libcore.aar"
            "composeApp/libs/libcore-desktop-linux-amd64.jar"
            "composeApp/libs/libcore-desktop-linux-arm64.jar"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required libcore artifact: $file"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=false" >> "$GITHUB_OUTPUT"
      - name: Golang Version
        if: steps.verify_libcore.outputs.ready != 'true'
        id: version
        run: |
          source buildScript/init/version.sh
          echo go_version=$GO_VERSION >> $GITHUB_OUTPUT
      - name: Install Golang
        if: steps.verify_libcore.outputs.ready != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.version.outputs.go_version }}
          cache-dependency-path: libcore/go.sum
      - uses: actions/setup-java@v5
        if: steps.verify_libcore.outputs.ready != 'true'
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Android NDK
        if: steps.verify_libcore.outputs.ready != 'true'
        # Pin NDK version for `gomobile`.
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          add-to-path: true
          ndk-version: r29
          local-cache: false
      - name: Resolve cronet-go version
        if: steps.verify_libcore.outputs.ready != 'true'
        id: cronet-go-version
        run: |
          echo "version=$(tr -d '[:space:]' < .github/CRONET_GO_VERSION)" >> "$GITHUB_OUTPUT"
      - name: Checkout cronet-go
        if: steps.verify_libcore.outputs.ready != 'true'
        uses: actions/checkout@v6
        with:
          repository: sagernet/cronet-go
          ref: ${{ steps.cronet-go-version.outputs.version }}
          path: cronet-go
          submodules: recursive
          fetch-depth: 1
      - name: Cache Chromium toolchain
        if: steps.verify_libcore.outputs.ready != 'true'
        uses: actions/cache@v5
        with:
          path: |
            cronet-go/naiveproxy/src/third_party/llvm-build/
            cronet-go/naiveproxy/src/gn/out/
            cronet-go/naiveproxy/src/chrome/build/pgo_profiles/
            cronet-go/naiveproxy/src/out/sysroot-build/
          key: cronet-toolchain-linux-amd64-arm64-${{ steps.cronet-go-version.outputs.version }}
      - name: Download Chromium toolchain
        if: steps.verify_libcore.outputs.ready != 'true'
        run: |
          set -xeuo pipefail
          rm -f "$GITHUB_WORKSPACE/cronet-go/naiveproxy/src/build/linux/sysroot_scripts/keyring.gpg"
          cd "$GITHUB_WORKSPACE/cronet-go"
          GPG_TTY=/dev/null ./naiveproxy/src/build/linux/sysroot_scripts/generate_keyring.sh
          go run ./cmd/build-naive --target=linux/amd64 download-toolchain
          go run ./cmd/build-naive --target=linux/arm64 download-toolchain
      - name: Native Build
        if: steps.verify_libcore.outputs.ready != 'true'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export CRONET_GO_ROOT="$GITHUB_WORKSPACE/cronet-go"
          # ./run lib core --android --desktop --desktoptargets linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64
          ./run lib core --android --desktop --desktoptargets linux/amd64,linux/arm64
      - name: Upload libcore
        uses: actions/upload-artifact@v7
        with:
          path: |
            composeApp/libs/libcore.aar
            composeApp/libs/libcore-desktop-linux-amd64.jar
            composeApp/libs/libcore-desktop-linux-arm64.jar
          if-no-files-found: error
          name: "libcore"
  build:
    name: Build FOSS APK
    runs-on: ubuntu-latest
    needs:
      - libcore
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: LibCore Artifact
        uses: actions/download-artifact@v8
        with:
          name: "libcore"
          path: composeApp/libs
      - name: Verify libcore artifacts
        run: |
          ls -la composeApp/libs || true
          test -f composeApp/libs/libcore.aar
          test -f composeApp/libs/libcore-desktop-linux-amd64.jar
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v5
      - name: Golang Version
        id: version
        run: |
          source buildScript/init/version.sh
          echo go_version=$GO_VERSION >> $GITHUB_OUTPUT
      - name: Install Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.version.outputs.go_version }}
          cache-dependency-path: libcore/go.sum
      - name: Build Assets
        run: |
          ./run init action gradle
      - name: Gradle Build
        env:
          BUILD_PLUGIN: none
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "${{ secrets.LOCAL_PROPERTIES }}" >> local.properties
          ./gradlew :composeApp:exportLibraryDefinitions
          ./gradlew clean androidApp:assembleFossDebug
          APK=$(find androidApp/build/outputs/apk -name '*arm64-v8a*.apk')
          APK=$(dirname $APK)
          rm $APK/output-metadata.json
          echo "APK=$APK" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v7
        with:
          name: APKs
          path: ${{ env.APK }}

  desktop:
    name: Build Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.runs_on }}
    needs:
      - libcore
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            target: linux/amd64
            runs_on: ubuntu-24.04
          - name: linux-arm64
            target: linux/arm64
            runs_on: ubuntu-24.04-arm
#          - darwin/amd64
#          - darwin/arm64
#          - windows/amd64
#          - windows/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: LibCore Artifact
        uses: actions/download-artifact@v8
        with:
          name: "libcore"
          path: composeApp/libs
      - name: Verify libcore artifacts
        run: |
          target="${{ matrix.target }}"
          platform="${target%%/*}"
          arch="${target##*/}"
          required_jar="composeApp/libs/libcore-desktop-${platform}-${arch}.jar"
          ls -la composeApp/libs || true
          test -f composeApp/libs/libcore.aar
          test -f "$required_jar"
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v5
      - name: Golang Version
        id: version
        run: |
          source buildScript/init/version.sh
          echo go_version=$GO_VERSION >> $GITHUB_OUTPUT
      - name: Install Golang
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.version.outputs.go_version }}
          cache-dependency-path: libcore/go.sum
      - name: Build Assets
        run: |
          ./run init action gradle
      - name: Desktop Package
        env:
          BUILD_PLUGIN: none
        run: |
          ./gradlew :composeApp:exportLibraryDefinitions
          ./gradlew -p composeApp packageUberJarForCurrentOS -PdesktopTarget=${{ matrix.target }}
      - name: Normalize artifact target
        id: artifact_target
        run: |
          target="${{ matrix.target }}"
          echo "safe=${target//\//-}" >> "$GITHUB_OUTPUT"
      - name: Upload Desktop Jar Artifact
        uses: actions/upload-artifact@v7
        with:
          name: "desktop-jar-${{ steps.artifact_target.outputs.safe }}"
          if-no-files-found: error
          path: composeApp/build/compose/jars/*.jar
