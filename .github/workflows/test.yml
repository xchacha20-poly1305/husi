name: Test

on:
  push:
    branches:
      - dev*
    paths:
      - "**.go"
      - "androidApp/**"
      - "composeApp/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches:
      - dev*
    paths:
      - "**.go"
      - "androidApp/**"
      - "composeApp/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Golang Version
        id: version
        run: |
          source buildScript/init/version.sh
          echo go_version=$GO_VERSION >> $GITHUB_OUTPUT
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.version.outputs.go_version }}
          cache-dependency-path: libcore/go.sum
      # - uses: golangci/golangci-lint-action@v6
      #   with:
      #     skip-cache: true
      #     working-directory: ./libcore/
      #     version: latest
      #     args: --timeout=30m --config="./.golangci.yml"
      #     install-mode: binary
      - name: Go Test
        run: |
          make test_go

      # Build core for gradle test
      - name: Golang Status
        run: find buildScript libcore/*.sh | xargs cat | sha1sum > golang_status
      - name: Libcore Status
        run: git ls-files libcore | xargs cat | sha1sum > libcore_status
      - name: LibCore Cache
        id: cache
        uses: actions/cache@v5
        with:
          path: |
            composeApp/libs
          key: ${{ hashFiles('.github/workflows/*', 'golang_status', 'libcore_status') }}
      - name: Verify LibCore cache
        id: verify_libcore
        run: |
          missing=0
          required_files=(
            "composeApp/libs/libcore.aar"
            "composeApp/libs/libcore-desktop-linux-amd64.jar"
            "composeApp/libs/libcore-desktop-linux-arm64.jar"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required libcore artifact: $file"
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ready=false" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Android NDK
        if: steps.verify_libcore.outputs.ready != 'true'
        # Pin NDK version for `gomobile`.
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          add-to-path: true
          ndk-version: r29
          local-cache: false
      - name: Resolve cronet-go version
        if: steps.verify_libcore.outputs.ready != 'true'
        id: cronet-go-version
        run: |
          echo "version=$(tr -d '[:space:]' < .github/CRONET_GO_VERSION)" >> "$GITHUB_OUTPUT"
      - name: Checkout cronet-go
        if: steps.verify_libcore.outputs.ready != 'true'
        uses: actions/checkout@v6
        with:
          repository: sagernet/cronet-go
          ref: ${{ steps.cronet-go-version.outputs.version }}
          path: cronet-go
          submodules: recursive
          fetch-depth: 1
      - name: Cache Chromium toolchain
        if: steps.verify_libcore.outputs.ready != 'true'
        uses: actions/cache@v5
        with:
          path: |
            cronet-go/naiveproxy/src/third_party/llvm-build/
            cronet-go/naiveproxy/src/gn/out/
            cronet-go/naiveproxy/src/chrome/build/pgo_profiles/
            cronet-go/naiveproxy/src/out/sysroot-build/
          key: cronet-toolchain-linux-amd64-arm64-${{ steps.cronet-go-version.outputs.version }}
      - name: Download Chromium toolchain
        if: steps.verify_libcore.outputs.ready != 'true'
        run: |
          set -xeuo pipefail
          rm -f "$GITHUB_WORKSPACE/cronet-go/naiveproxy/src/build/linux/sysroot_scripts/keyring.gpg"
          cd "$GITHUB_WORKSPACE/cronet-go"
          GPG_TTY=/dev/null ./naiveproxy/src/build/linux/sysroot_scripts/generate_keyring.sh
          go run ./cmd/build-naive --target=linux/amd64 download-toolchain
          go run ./cmd/build-naive --target=linux/arm64 download-toolchain
      - name: Build Libcore
        if: steps.verify_libcore.outputs.ready != 'true'
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          export CRONET_GO_ROOT="$GITHUB_WORKSPACE/cronet-go"
          # ./run lib core --android --desktop --desktoptargets linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64
          ./run lib core --android --desktop --desktoptargets linux/amd64,linux/arm64
      - name: Upload libcore
        uses: actions/upload-artifact@v6
        with:
          name: "libcore"
          path: |
            composeApp/libs/libcore.aar
            composeApp/libs/libcore-desktop-linux-amd64.jar
            composeApp/libs/libcore-desktop-linux-arm64.jar
          if-no-files-found: error
      - name: Verify libcore artifacts
        run: |
          ls -la composeApp/libs || true
          test -f composeApp/libs/libcore.aar
          test -f composeApp/libs/libcore-desktop-linux-amd64.jar
          test -f composeApp/libs/libcore-desktop-linux-arm64.jar

      - uses: gradle/actions/setup-gradle@v5
      - name: Gradle Test
        run: |
          make test_gradle

  desktop:
    name: Desktop Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - test
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux/amd64
          - linux/arm64
#          - darwin/amd64
#          - darwin/arm64
#          - windows/amd64
#          - windows/arm64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: LibCore Artifact
        uses: actions/download-artifact@v7
        with:
          name: "libcore"
          path: composeApp/libs
      - name: Verify libcore artifacts
        run: |
          target="${{ matrix.target }}"
          platform="${target%%/*}"
          arch="${target##*/}"
          required_jar="composeApp/libs/libcore-desktop-${platform}-${arch}.jar"
          ls -la composeApp/libs || true
          test -f composeApp/libs/libcore.aar
          test -f "$required_jar"
      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v5
      - name: Desktop Compile
        env:
          BUILD_PLUGIN: none
        run: |
          ./run init action gradle
          ./gradlew -p composeApp :composeApp:compileKotlinDesktop -PdesktopTarget=${{ matrix.target }}
